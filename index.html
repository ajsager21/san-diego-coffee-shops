<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.J.'s San Diego Coffee Guide — Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --espresso: #1c1410;
  --espresso-2: #251b15;
  --panel: #2b201a;
  --panel-hi: #362820;
  --line: #4a382d;
  --cream: #f3e9d8;
  --cream-dim: #cbb89f;
  --muted: #9c8672;
  --gold: #cf9d3f;
  --gold-hi: #e8bc63;
  --sage: #8fae7a;
  --steel: #7ea3bc;
  --taupe: #a5876c;
  --dark-roast: #7a4a34;
  --rust: #b25c3f;
  --tier-S: #cf9d3f;
  --tier-A: #8fae7a;
  --tier-B: #7ea3bc;
  --tier-C: #a5876c;
  --tier-D: #7a4a34;
  --radius: 10px;
  --shadow: 0 8px 24px rgba(0,0,0,0.35);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background: var(--espresso);
  color: var(--cream);
  font-family: 'Inter', sans-serif;
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono', monospace;}
.display{font-family:'Fraunces', serif;}

#app{
  display:flex;
  min-height:100vh;
}

/* ---------- SIDEBAR ---------- */
#sidebar{
  width: 232px;
  flex-shrink:0;
  background: var(--espresso-2);
  border-right: 1px solid var(--line);
  padding: 24px 16px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
.brand{
  font-family:'Fraunces', serif;
  font-weight:600;
  font-size: 20px;
  line-height:1.25;
  color:var(--cream);
  margin-bottom: 4px;
}
.brand small{
  display:block;
  font-family:'IBM Plex Mono', monospace;
  font-size:10.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--gold);
  margin-top:6px;
}
nav{margin-top:28px; display:flex; flex-direction:column; gap:2px;}
.navbtn{
  display:flex; align-items:center; gap:10px;
  background:transparent; border:none; text-align:left;
  color: var(--cream-dim);
  font-family:'Inter',sans-serif; font-size:13.5px; font-weight:500;
  padding:10px 12px; border-radius:8px; cursor:pointer;
  transition: background .15s, color .15s;
}
.navbtn:hover{ background: var(--panel); color:var(--cream); }
.navbtn.active{ background: var(--panel-hi); color: var(--gold-hi); }
.navbtn .ico{ font-size:15px; width:18px; text-align:center; }

.sidebar-foot{
  margin-top:28px; padding-top:16px; border-top:1px solid var(--line);
  font-size:11px; color:var(--muted); line-height:1.6;
}

/* ---------- MAIN ---------- */
#main{ flex:1; min-width:0; padding: 32px 40px 80px; }
.section{ display:none; }
.section.active{ display:block; animation: fadein .25s ease; }
@keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

.page-title{
  font-family:'Fraunces', serif; font-weight:600; font-size:30px; color:var(--cream);
  margin:0 0 6px;
}
.page-sub{ color:var(--cream-dim); font-size:14px; margin: 0 0 28px; max-width:680px; line-height:1.5;}

/* ---------- CARDS / GRID ---------- */
.card{
  background: var(--panel);
  border:1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
}
.grid{ display:grid; gap:16px; }
.grid-4{ grid-template-columns: repeat(4, 1fr); }
.grid-3{ grid-template-columns: repeat(3, 1fr); }
.grid-2{ grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1100px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);} }

.stat-num{ font-family:'Fraunces', serif; font-size:34px; font-weight:600; color:var(--gold-hi); line-height:1;}
.stat-label{ font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-top:8px;}

/* ---------- TABLE ---------- */
table{ width:100%; border-collapse:collapse; font-size:13.5px;}
thead th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em;
  color:var(--muted); padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none;
  white-space:nowrap;
}
thead th:hover{ color:var(--gold-hi); }
tbody td{ padding:10px 12px; border-bottom:1px solid rgba(74,56,45,0.5); vertical-align:middle;}
tbody tr{ cursor:pointer; transition: background .12s; }
tbody tr:hover{ background: var(--panel-hi); }
.shopname{ color:var(--cream); font-weight:600; }
.venuetag{ font-size:10.5px; color:var(--muted); }

.tierbadge{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:26px; height:22px; padding:0 8px; border-radius:6px;
  font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
  color:#1c1410;
}
.tierbadge.S{ background: var(--tier-S); }
.tierbadge.A{ background: var(--tier-A); }
.tierbadge.B{ background: var(--tier-B); }
.tierbadge.C{ background: var(--tier-C); color:var(--cream); }
.tierbadge.D{ background: var(--tier-D); color:var(--cream); }

/* ---------- FILTER BAR ---------- */
.filterbar{
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  margin-bottom:18px; padding:14px 16px; background:var(--panel); border:1px solid var(--line); border-radius: var(--radius);
}
input[type=text], select{
  background: var(--espresso-2); border:1px solid var(--line); color:var(--cream);
  font-family:'Inter',sans-serif; font-size:13px; padding:8px 12px; border-radius:7px;
  outline:none;
}
input[type=text]:focus, select:focus{ border-color: var(--gold); }
input[type=text]{ min-width:220px; }
.filter-count{ margin-left:auto; font-size:12px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}

/* ---------- BUTTONS / CHIPS ---------- */
.chip{
  display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:20px;
  background: var(--panel-hi); border:1px solid var(--line); color:var(--cream-dim);
  font-size:12px; cursor:pointer; transition: all .12s;
}
.chip:hover{ border-color:var(--gold); color:var(--gold-hi); }
.chip.selected{ background: var(--gold); color:#1c1410; border-color:var(--gold); font-weight:600;}
.btn{
  background: var(--gold); color:#1c1410; border:none; font-weight:600; font-size:13px;
  padding:9px 16px; border-radius:7px; cursor:pointer; font-family:'Inter',sans-serif;
}
.btn:hover{ background: var(--gold-hi); }
.btn.ghost{ background:transparent; color:var(--cream-dim); border:1px solid var(--line); }
.btn.ghost:hover{ color:var(--cream); border-color:var(--gold); }

/* ---------- AWARD CARDS ---------- */
.award-card{
  background: var(--panel); border:1px solid var(--line); border-radius: var(--radius);
  padding:16px 18px; cursor:pointer; transition: transform .12s, border-color .12s;
}
.award-card:hover{ border-color: var(--gold); transform: translateY(-1px); }
.award-title{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--gold); font-weight:600; margin-bottom:6px;}
.award-winner{ font-family:'Fraunces', serif; font-size:19px; font-weight:600; color:var(--cream); margin-bottom:6px;}
.award-blurb{ font-size:12.5px; color:var(--cream-dim); line-height:1.45; }

/* ---------- ARCHETYPE CARDS ---------- */
.archetype-card{
  background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); padding:22px;
}
.archetype-name{ font-family:'Fraunces',serif; font-weight:600; font-size:21px; color:var(--gold-hi); margin-bottom:4px;}
.archetype-meta{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--muted); margin-bottom:10px;}
.archetype-tag{ font-size:13px; color:var(--cream-dim); line-height:1.5; margin-bottom:14px;}
.member-list{ display:flex; flex-wrap:wrap; gap:6px; }

/* ---------- MODAL ---------- */
#overlay{
  position:fixed; inset:0; background:rgba(10,7,5,0.7); backdrop-filter: blur(2px);
  display:none; align-items:flex-start; justify-content:center; z-index:100; padding: 5vh 20px;
  overflow-y:auto;
}
#overlay.show{ display:flex; }
#modal{
  background: var(--espresso-2); border:1px solid var(--line); border-radius:14px;
  max-width:640px; width:100%; padding:30px 32px; box-shadow: var(--shadow);
  margin-bottom: 5vh;
}
#modal .close{
  float:right; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer;
}
#modal .close:hover{ color:var(--cream); }
.modal-tier-row{ display:flex; align-items:center; gap:10px; margin-bottom:4px;}
.modal-name{ font-family:'Fraunces',serif; font-weight:600; font-size:26px; color:var(--cream); }
.modal-sub{ color:var(--muted); font-size:13px; margin-bottom:16px; }
.score-row{ display:flex; gap:22px; flex-wrap:wrap; margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid var(--line);}
.score-item .n{ font-family:'IBM Plex Mono',monospace; font-size:20px; color:var(--gold-hi); font-weight:600;}
.score-item .l{ font-size:10.5px; text-transform:uppercase; color:var(--muted); letter-spacing:.05em; margin-top:2px;}
.catbar-row{ display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:12px; }
.catbar-label{ width:150px; flex-shrink:0; color:var(--cream-dim); }
.catbar-track{ flex:1; height:7px; background: var(--panel); border-radius:4px; overflow:hidden; }
.catbar-fill{ height:100%; background: linear-gradient(90deg, var(--dark-roast), var(--gold)); border-radius:4px; }
.catbar-val{ width:28px; text-align:right; font-family:'IBM Plex Mono',monospace; color:var(--muted); }
.modal-section-title{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--gold); margin: 18px 0 8px; font-weight:600;}
.modal-report{ font-size:13.5px; line-height:1.6; color:var(--cream-dim); }
.rec-chip{ margin-right:6px; margin-bottom:6px; }

/* ---------- MAP ---------- */
.map-wrap{ background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); padding:20px; }
.map-dot{ cursor:pointer; transition: r .12s; }
.map-dot:hover{ filter: brightness(1.3); }
.map-label{ font-family:'IBM Plex Mono',monospace; font-size:9.5px; fill: var(--cream-dim); pointer-events:none; }

/* ---------- MISC ---------- */
.section-label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--gold); font-weight:600; margin: 30px 0 12px;}
.section-label:first-child{ margin-top:0; }
::-webkit-scrollbar{ width:9px; height:9px; }
::-webkit-scrollbar-thumb{ background: var(--panel-hi); border-radius:5px; }
::-webkit-scrollbar-track{ background: transparent; }
a{ color: var(--gold-hi); }

.tabs-inline{ display:flex; gap:6px; margin-bottom:20px; }
.tab-inline-btn{
  background:var(--panel); border:1px solid var(--line); color:var(--cream-dim);
  padding:8px 16px; border-radius:20px; font-size:12.5px; cursor:pointer; font-family:'Inter',sans-serif; font-weight:500;
}
.tab-inline-btn.active{ background: var(--gold); color:#1c1410; border-color:var(--gold); font-weight:600;}

.compare-slot{
  background:var(--panel); border:1px dashed var(--line); border-radius:var(--radius);
  padding:14px; min-height:64px; display:flex; align-items:center; justify-content:center;
  color:var(--muted); font-size:12.5px; text-align:center;
}
.compare-slot.filled{ border-style:solid; border-color:var(--gold); color:var(--cream); flex-direction:column; align-items:flex-start; }
.compare-slot .remove{ align-self:flex-end; cursor:pointer; color:var(--muted); font-size:11px; }

svg text{ font-family:'IBM Plex Mono', monospace; }
</style>
</head>

function openProfile(name){
  const s = byName[name];
  if(!s) return;
  const el = document.getElementById('modal');
  const catRows = CATS.map(c=>{
    const v = s.categories[c];
    if(v===null||v===undefined) return `<div class="catbar-row"><div class="catbar-label">${CAT_SHORT[c]}</div><div class="catbar-track"></div><div class="catbar-val">N/A</div></div>`;

  }).join('');

  const awardsHtml = s.awards.length ? s.awards.map(a=>`<span class="chip" style="cursor:default">🎖 ${esc(a)}</span>`).join(' ') : '<span style="color:var(--muted);font-size:12.5px;">No awards this edition</span>';

  `).join('');
}

function drawDonut(container, segs){
  const total = segs.reduce((a,s)=>a+s.value,0);
  const r = 54, cx=64, cy=64, sw=18;
  let acc = 0;
  const circ = 2*Math.PI*r;
  let paths = segs.map(seg=>{
    const frac = seg.value/total;
    const dash = frac*circ;
    const gap = circ-dash;
    const rotate = (acc/total)*360 - 90;
    acc += seg.value;
    return `<circle r="${r}" cx="${cx}" cy="${cy}" fill="none" stroke="${seg.color}" stroke-width="${sw}"
      stroke-dasharray="${dash} ${gap}" transform="rotate(${rotate} ${cx} ${cy})" />`;
  }).join('');
  const svg = `<svg width="128" height="128" viewBox="0 0 128 128">${paths}
    <text x="64" y="60" text-anchor="middle" fill="var(--cream)" font-size="22" font-weight="600" font-family="Fraunces, serif">${total}</text>
    <text x="64" y="76" text-anchor="middle" fill="var(--muted)" font-size="9">SHOPS</text>
  </svg>`;
  const legend = segs.map(s=>`<div style="display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:6px;">
    <span style="width:10px;height:10px;border-radius:3px;background:${s.color};display:inline-block;"></span>
    <span style="color:var(--cream-dim);">${TIER_LABEL[s.label]}</span>
    <span class="mono" style="margin-left:auto;color:var(--muted);">${s.value}</span>
  </div>`).join('');
  container.innerHTML = svg + `<div style="flex:1;">${legend}</div>`;
}

function drawRankHeader(){

  thead.innerHTML = '<tr>'+cols.map(([k,l])=>`<th data-key="${k}">${l}</th>`).join('')+'</tr>';
  thead.querySelectorAll('th').forEach(th=>{
    th.onclick = ()=>{
      const key = th.dataset.key;
      rankSort.dir = (rankSort.key===key) ? -rankSort.dir : 1;
      rankSort.key = key;
      drawRankTable();
    };
  });
}
function deltaBadge(primaryRank, otherRank){
  const diff = primaryRank - otherRank; // positive = other rank is better (lower number)
  if(diff===0) return `<span class="mono" style="color:var(--muted);">—</span>`;
  const up = diff>0;
  const color = up ? 'var(--sage)' : 'var(--rust)';
  const arrow = up ? '▲' : '▼';
  return `<span class="mono" style="color:${color};">#${otherRank} ${arrow}${Math.abs(diff)}</span>`;
}
function drawRankTable(){
  const search = document.getElementById('rk-search').value.toLowerCase();
  const venue = document.getElementById('rk-venue').value;
  const tier = document.getElementById('rk-tier').value;
  const city = document.getElementById('rk-city').value;

  let rows = DATA.shops.filter(s=>
    (!search || s.name.toLowerCase().includes(search)) &&
    (!venue || s.venueType===venue) &&
    (!tier || s.tier===tier) &&
    (!city || s.city===city)
  );
  rows.sort((a,b)=>{
    const k = rankSort.key;
    if(typeof a[k]==='string') return a[k].localeCompare(b[k]) * rankSort.dir;
    return (a[k]-b[k]) * rankSort.dir;
  });
  document.getElementById('rk-count').textContent = `${rows.length} of ${DATA.shops.length} shops`;

  const tbody = document.querySelector('#rk-table tbody');
  tbody.innerHTML = rows.map(s=>{
    if(rankMode==='balanced'){
      return `<tr onclick="openProfile('${s.name.replace(/'/g,"\\'")}')">
        <td class="mono">${s.balancedRank}</td>
        <td class="shopname">${esc(s.name)}</td>
        <td class="venuetag">${esc(s.venueType)}</td>
        <td class="venuetag">${esc(s.city)}</td>
        <td><span class="tierbadge ${s.tier}">${s.tier}</span></td>
        <td class="mono" style="color:var(--gold-hi);">${s.balanced.toFixed(2)}</td>
        <td>${deltaBadge(s.balancedRank, s.ajRank)}</td>
      </tr>`;
    }
    return `<tr onclick="openProfile('${s.name.replace(/'/g,"\\'")}')">
      <td class="mono">${s.ajRank}</td>
      <td class="shopname">${esc(s.name)}</td>
      <td class="venuetag">${esc(s.venueType)}</td>
      <td class="venuetag">${esc(s.city)}</td>
      <td class="mono" style="color:var(--gold-hi);">${s.aj.toFixed(0)}</td>
      <td>${deltaBadge(s.ajRank, s.balancedRank)}</td>
    </tr>`;
  }).join('');
}

function drawMap(){
  const svg = document.getElementById('sd-map');
  const lats = DATA.shops.map(s=>s.lat), lons = DATA.shops.map(s=>s.lon);
  const latMin=Math.min(...lats)-0.03, latMax=Math.max(...lats)+0.03;
  const lonMin=Math.min(...lons)-0.03, lonMax=Math.max(...lons)+0.03;
  const W=720,H=480, pad=40;
  function proj(lat,lon){
    const x = pad + (lon-lonMin)/(lonMax-lonMin) * (W-2*pad);
    const y = pad + (latMax-lat)/(latMax-latMin) * (H-2*pad);
    return [x,y];
  }
  const byCity = {};
  DATA.shops.forEach(s=>{
    byCity[s.city] = byCity[s.city] || {lat:s.lat, lon:s.lon, shops:[]};
    byCity[s.city].shops.push(s);
  });
  const maxN = Math.max(...Object.values(byCity).map(c=>c.shops.length));
  let dots = '';
  Object.entries(byCity).forEach(([city,c])=>{
    const [x,y] = proj(c.lat,c.lon);
    const n = c.shops.length;
    const avg = c.shops.reduce((a,s)=>a+s.balanced,0)/n;
    const r = 6 + (n/maxN)*16;
    const t = (avg-4.5)/(8.5-4.5);
    const color = `hsl(${30+t*45}, 55%, ${35+t*25}%)`;
    dots += `<circle class="map-dot" cx="${x}" cy="${y}" r="${r}" fill="${color}" fill-opacity="0.85" stroke="#1c1410" stroke-width="1.5" onclick="showCity('${city.replace(/'/g,"\\'")}')"><title>${esc(city)} — ${n} shop(s), avg ${avg.toFixed(2)}</title></circle>`;
    dots += `<text class="map-label" x="${x}" y="${y - r - 6}" text-anchor="middle">${esc(city)}</text>`;
  });
  svg.innerHTML = dots;
}
function showCity(city){
  const shops = DATA.shops.filter(s=>s.city===city).sort((a,b)=>a.balancedRank-b.balancedRank);
  const avg = (shops.reduce((a,s)=>a+s.balanced,0)/shops.length).toFixed(2);
  document.getElementById('map-detail').innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;">
        <div class="display" style="font-size:19px; font-weight:600;">${esc(city)}, CA</div>
        <div class="mono" style="color:var(--gold-hi);">avg ${avg} · n=${shops.length}</div>
      </div>
      ${shops.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);cursor:pointer;" onclick="openProfile('${s.name.replace(/'/g,"\\'")}')">
        <span class="tierbadge ${s.tier}" style="min-width:20px;height:20px;font-size:10px;">${s.tier}</span>
        <span style="flex:1;font-size:13.5px;">${esc(s.name)}</span>
        <span class="venuetag">${esc(s.venueType)}</span>
        <span class="mono" style="color:var(--gold-hi);">${s.balanced.toFixed(2)}</span>
      </div>`).join('')}
    </div>
  `;
}

function drawVenueComparison(){
  const byVenue = {};
  DATA.shops.forEach(s=>{
    byVenue[s.venueType] = byVenue[s.venueType] || [];
    byVenue[s.venueType].push(s.balanced);
  });
  const stats = Object.entries(byVenue).map(([v,arr])=>({
    venue:v, n:arr.length, mean: arr.reduce((a,b)=>a+b,0)/arr.length
  })).sort((a,b)=>b.mean-a.mean);
  const maxMean = Math.max(...stats.map(s=>s.mean));

  document.getElementById('venue-bars').innerHTML = `<div class="section-label" style="margin-top:0;">Avg Balanced Score by Venue Type</div>` +
    stats.map(s=>`
    <div style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;">
        <span style="color:var(--cream-dim);">${esc(s.venue)}</span>
        <span class="mono" style="color:var(--gold-hi);">${s.mean.toFixed(2)} (n=${s.n})</span>
      </div>
      <div class="catbar-track"><div class="catbar-fill" style="width:${(s.mean/maxMean)*100}%"></div></div>
    </div>`).join('');

  document.getElementById('venue-table').innerHTML = `<div class="section-label" style="margin-top:0;">Neighborhoods by Sample Size</div>` +
    uniq(DATA.shops.map(s=>s.city)).map(c=>{
      const arr = DATA.shops.filter(s=>s.city===c);
      const mean = arr.reduce((a,s)=>a+s.balanced,0)/arr.length;
      return {c, n:arr.length, mean};
    }).sort((a,b)=>b.n-a.n).slice(0,8).map(x=>`
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:12.5px;">
        <span style="color:var(--cream-dim);">${esc(x.c)}</span>
        <span class="mono" style="color:var(--muted);">n=${x.n}</span>
        <span class="mono" style="color:var(--gold-hi);">${x.mean.toFixed(2)}</span>
      </div>`).join('');
}

function renderSearch(){

        <div class="grid grid-3" id="cmp-slots" style="margin-bottom:16px;"></div>
        <div class="card" id="cmp-chart-wrap" style="display:none;">
          <svg id="cmp-radar" width="100%" viewBox="0 0 400 400"></svg>

        </div>
      </div>

  `;
  document.getElementById('sr-search').addEventListener('input', drawSearchResults);
  drawSearchResults();

}
function drawSearchResults(){
  const q = document.getElementById('sr-search').value.toLowerCase();
  let rows = DATA.shops.filter(s=> !q || s.name.toLowerCase().includes(q) || s.venueType.toLowerCase().includes(q) || s.city.toLowerCase().includes(q));
  rows.sort((a,b)=>a.balancedRank-b.balancedRank);
  document.getElementById('sr-count').textContent = `${rows.length} results`;
  document.getElementById('sr-results').innerHTML = rows.slice(0,40).map(s=>{
    const inCompare = compareList.includes(s.name);
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);">
      <span class="tierbadge ${s.tier}" style="min-width:20px;height:20px;font-size:10px;">${s.tier}</span>
      <span style="flex:1;font-size:13.5px;cursor:pointer;" onclick="openProfile('${s.name.replace(/'/g,"\\'")}')">${esc(s.name)} <span class="venuetag">· ${esc(s.venueType)}, ${esc(s.city)}</span></span>
      <span class="mono" style="color:var(--gold-hi);font-size:12.5px;">${s.balanced.toFixed(2)}</span>
      <button class="btn ghost" style="padding:4px 10px;font-size:11px;" onclick="toggleCompare('${s.name.replace(/'/g,"\\'")}')">${inCompare?'Remove':'Compare'}</button>
    </div>`;
  }).join('');
}
function toggleCompare(name){
  const idx = compareList.indexOf(name);
  if(idx>-1){ compareList.splice(idx,1); }
  else{ if(compareList.length>=3){ compareList.shift(); } compareList.push(name); }
  drawSearchResults();
  drawCompareSlots();
}
function drawCompareSlots(){
  const slots = document.getElementById('cmp-slots');
  const html = [0,1,2].map(i=>{
    const name = compareList[i];
    if(!name) return `<div class="compare-slot">Empty slot</div>`;
    const s = byName[name];
    return `<div class="compare-slot filled">
      <span class="remove" onclick="toggleCompare('${name.replace(/'/g,"\\'")}')">✕ remove</span>
      <div style="font-weight:600;font-size:13px;margin-top:4px;">${esc(s.name)}</div>
      <div class="mono" style="font-size:11px;color:var(--muted);">${s.balanced.toFixed(2)} Balanced</div>
    </div>`;
  }).join('');
  slots.innerHTML = html;
  const wrap = document.getElementById('cmp-chart-wrap');
  if(compareList.length>=2){
    wrap.style.display='block';
    drawRadar(compareList.map(n=>byName[n]));
  } else {
    wrap.style.display='none';
  }
}
const CMP_COLORS = ['#cf9d3f','#8fae7a','#7ea3bc'];
function drawRadar(shops){
  const svg = document.getElementById('sd-radar-unused'); // placeholder no-op
  const target = document.getElementById('cmp-radar');
  const n = CATS.length;
  const cx=200, cy=200, R=150;
  const angle = i => (Math.PI*2*i/n) - Math.PI/2;

  let axes = '', labels = '';
  for(let i=0;i<n;i++){
    const a = angle(i);
    const x = cx + R*Math.cos(a), y = cy + R*Math.sin(a);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;
    const lx = cx + (R+22)*Math.cos(a), ly = cy + (R+22)*Math.sin(a);
    labels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="var(--cream-dim)">${CAT_SHORT[CATS[i]]}</text>`;
  }
  let rings = '';
  [0.25,0.5,0.75,1].forEach(f=>{
    let pts = [];
    for(let i=0;i<n;i++){ const a=angle(i); pts.push(`${cx+R*f*Math.cos(a)},${cy+R*f*Math.sin(a)}`); }
    rings += `<polygon points="${pts.join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  });

  let polys = '';
  shops.forEach((s,idx)=>{
    let pts = [];
    for(let i=0;i<n;i++){
      const v = s.categories[CATS[i]];
      const val = (v===null||v===undefined) ? 0 : v;
      const a = angle(i);
      const rr = R * (val/10);
      pts.push(`${cx+rr*Math.cos(a)},${cy+rr*Math.sin(a)}`);
    }
    polys += `<polygon points="${pts.join(' ')}" fill="${CMP_COLORS[idx]}" fill-opacity="0.18" stroke="${CMP_COLORS[idx]}" stroke-width="2"/>`;
  });

  target.innerHTML = rings + axes + polys + labels;
  document.getElementById('cmp-legend').innerHTML = shops.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--cream-dim);">
      <span style="width:10px;height:10px;border-radius:3px;background:${CMP_COLORS[i]};display:inline-block;"></span>${esc(s.name)}
    </div>`).join('');
}
